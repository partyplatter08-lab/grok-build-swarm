# Build and publish grok-swarm binaries to GitHub Releases.
#
# Triggers:
#   - push of tags matching v*  (e.g. git tag v0.2.106 && git push fork v0.2.106)
#   - workflow_dispatch (manual) with optional tag input
#
# Assets:
#   grok-swarm-{version}-{os}-{arch}   (macos-aarch64, macos-x86_64, linux-x86_64, linux-aarch64)
#
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.106). Leave empty to use run id."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset_triple: macos-aarch64
          # macos-13 (Intel) can queue forever on free tiers — use macos-15 with
          # an x86_64 target when available; fall back to native host build on
          # macos-14 and skip if host is arm-only by using cross-compile flags.
          - os: macos-13
            target: x86_64-apple-darwin
            asset_triple: macos-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_triple: linux-x86_64
          # Native ARM Linux runners (no cross / no missing protoc in docker)
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_triple: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install DotSlash (protoc)
        run: |
          cargo install dotslash --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # Ensure bin/protoc (dotslash wrapper) can run
          command -v dotslash
          /usr/bin/env dotslash --help >/dev/null || true

      - name: Install protoc (system fallback)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler
          protoc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          # Prefer building for the matrix target; fall back to host if target matches
          cargo build -p xai-grok-pager-bin --release --bin grok-swarm --target ${{ matrix.target }}
          BIN="target/${{ matrix.target }}/release/grok-swarm"
          if [[ ! -f "$BIN" ]]; then
            BIN="target/release/grok-swarm"
          fi
          test -x "$BIN"
          echo "BIN=$BIN" >> "$GITHUB_ENV"
          ls -lh "$BIN"

      - name: Stage asset
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            VER="${{ inputs.tag }}"
            VER="${VER#v}"
          else
            VER="0.0.0-dev.${{ github.run_number }}"
          fi
          ASSET="grok-swarm-${VER}-${{ matrix.asset_triple }}"
          cp "$BIN" "$ASSET"
          chmod +x "$ASSET"
          # smoke on native (non-cross) builds
          ./"$ASSET" --version || true
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "VER=$VER" >> "$GITHUB_ENV"
          ls -lh "$ASSET"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    # Publish even if some platforms failed — attach whatever succeeded.
    if: always() && (github.ref_type == 'tag' || inputs.tag != '')
    steps:
      - uses: actions/checkout@v4

      - name: Download all assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
        continue-on-error: true

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
            [[ "$TAG" == v* ]] || TAG="v${TAG}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Assets present:"
          ls -la dist/ || echo "(none yet)"
          # Fail only if zero assets
          count=$(find dist -type f 2>/dev/null | wc -l | tr -d ' ')
          if [[ "$count" -lt 1 ]]; then
            echo "error: no release assets downloaded" >&2
            exit 1
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: grok-swarm ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
          body: |
            # Grok Build Swarm

            Multi-agent fork of Grok Build: **Heavy**, **Agent Swarm**, **Swarm Heavy**.

            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/partyplatter08-lab/grok-build-swarm/main/install.sh | bash
            ```

            Then open a new terminal and run `grok-swarm`.

            If you see `command not found`, run:
            ```bash
            source ~/.zshrc   # or ~/.bashrc
            # or:
            ~/.local/bin/grok-swarm
            ```

            ## Modes

            | Effort | Behavior |
            |--------|----------|
            | `heavy` | Collaborative council |
            | `swarm` | Parallel map → implement → verify |
            | `swarm-heavy` | Council + swarm fan-out + synthesis |

            Coexists with stock `grok` as `grok-swarm`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
